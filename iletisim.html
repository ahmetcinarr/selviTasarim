<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>İletişim - Selvi GSM</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header>
    <img src="/assets/images/logo.png" alt="Selvi GSM Logo" class="logo">
    <nav>
      <a href="/index.html">Ana Sayfa</a>
      <a href="/telefonlar.html">Telefonlar</a>
      <a href="/urunler.html">Ürünler</a>
      <a href="/teknik-servis.html">Teknik Servis</a>
      <a href="/calismalar.html">Çalışmalarımız</a>
      <a href="/hakkimizda.html">Hakkımızda</a>
      <a href="/iletisim.html" class="active">İletişim</a>
    </nav>
    <img src="/assets/images/header-right.png" alt="Header Image" class="header-img">
    <button id="dark-toggle" class="dark-toggle" title="Tema Değiştir">🌙</button>
  </header>
  <main>
    <section style="margin:2rem 0;max-width:900px;margin-left:auto;margin-right:auto;">
      <h1>İletişim</h1>
      <form style="display:grid;gap:1rem;max-width:500px;margin:auto;" autocomplete="off">
        <div style="display:flex;gap:1rem;">
          <input type="text" name="ad" placeholder="Ad" required style="flex:1;padding:0.7rem;border-radius:0.5rem;border:1px solid #ccc;">
          <input type="text" name="soyad" placeholder="Soyad" required style="flex:1;padding:0.7rem;border-radius:0.5rem;border:1px solid #ccc;">
        </div>
        <input type="email" name="email" placeholder="E-posta" required style="padding:0.7rem;border-radius:0.5rem;border:1px solid #ccc;">
        <input type="tel" name="telefon" placeholder="Telefon" required style="padding:0.7rem;border-radius:0.5rem;border:1px solid #ccc;">
        <textarea name="mesaj" placeholder="Mesajınız" rows="4" required style="padding:0.7rem;border-radius:0.5rem;border:1px solid #ccc;"></textarea>
        <button type="submit" class="btn">Gönder</button>
      </form>
      <div style="margin:2rem 0;text-align:center;">
        <b>Telefon:</b> <a href="tel:+905551112233" style="color:var(--primary-color);">+90 555 111 22 33</a><br>
        <b>E-posta:</b> <a href="mailto:info@selvigsm.com" style="color:var(--primary-color);">info@selvigsm.com</a>
      </div>
      <div style="margin:2rem 0;text-align:center;">
        <iframe src="https://www.google.com/maps?q=Selvi+GSM+Istanbul&output=embed" width="100%" height="300" style="border:0;border-radius:1rem;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </section>
  </main>
  <footer>
    <div class="social-icons">
      <a href="#" title="Instagram"><img src="/assets/images/instagram.svg" alt="Instagram" width="24"></a>
      <a href="#" title="Facebook"><img src="/assets/images/facebook.svg" alt="Facebook" width="24"></a>
      <a href="#" title="WhatsApp"><img src="/assets/images/whatsapp.svg" alt="WhatsApp" width="24"></a>
    </div>
    <div>Çalışma Saatleri: 09:00 - 20:00 (Pazar Kapalı)</div>
    <div>Tel: <a href="tel:+905551112233" style="color:var(--primary-color);">+90 555 111 22 33</a> | E-posta: <a href="mailto:info@selvigsm.com" style="color:var(--primary-color);">info@selvigsm.com</a></div>
    <div style="margin-top:1rem;">&copy; 2024 Selvi GSM. Tüm hakları saklıdır.</div>
  </footer>
  <script src="/js/main.js"></script>
  <script>
    // Form submit placeholder
    document.querySelector('form').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Form gönderildi! (Backend entegrasyonu yapılacak)');
    });
  </script>
</body>
</html>
